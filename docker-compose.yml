version: '3.8'

services:
  db:
    image: postgres:14
    container_name: churn_db
    environment:
      POSTGRES_DB: ${DB_NAME:-churn_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-0000}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: churn_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432

  fastapi:
    build:
      context: ./pfe_final/churn_api
      dockerfile: Dockerfile
    container_name: churn_fastapi
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./pfe_final/churn_api:/app
      - ./models:/app/models
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - django

volumes:
  postgres_data:
  static_volume:
  media_volume:
